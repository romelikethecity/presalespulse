<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500&family=Source+Code+Pro:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #111111;
    font-family: 'Sora', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Grid overlay */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* Radial glow */
  body::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 800px;
    height: 800px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(30,58,95,0.12) 0%, transparent 70%);
    z-index: 0;
  }

  .top-bar {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 40px 60px 0;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-text {
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: #F0F0F0;
  }

  .logo-text span {
    color: #93C5FD;
  }

  .domain {
    font-family: 'Source Code Pro', monospace;
    font-size: 14px;
    color: #666;
    letter-spacing: 1px;
  }

  .content-split {
    position: relative;
    z-index: 1;
    display: flex;
    padding: 60px 60px 0;
    gap: 60px;
  }

  .left {
    flex: 1;
  }

  .category-label {
    font-family: 'Source Code Pro', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #2563EB;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .title {
    font-family: 'Sora', sans-serif;
    font-size: 44px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.15;
    max-width: 520px;
  }

  .accent-bar {
    width: 80px;
    height: 4px;
    background: #1E3A5F;
    border-radius: 2px;
    margin-top: 32px;
  }

  .right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 340px;
    padding: 30px 40px;
    background: rgba(255,255,255,0.03);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .salary-range {
    font-family: 'Source Code Pro', monospace;
    font-size: 64px;
    font-weight: 700;
    color: #2563EB;
    line-height: 1.1;
    text-align: center;
  }

  .salary-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px;
    color: #666;
    margin-top: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="top-bar">
    <div class="logo-group">
      <svg width="40" height="40" viewBox="0 0 80 80">
        <rect width="80" height="80" rx="16" fill="#1E3A5F"/>
        <polygon points="32,24 32,56 58,40" fill="white"/>
      </svg>
      <div class="logo-text">PreSales <span>Pulse</span></div>
    </div>
    <div class="domain">PRESALESPULSE.COM</div>
  </div>

  <div class="content-split">
    <div class="left">
      <div class="category-label">SALARY DATA</div>
      <div class="title">{{TITLE}}</div>
      <div class="accent-bar"></div>
    </div>
    <div class="right">
      <div class="salary-range">{{SUBTITLE}}</div>
      <div class="salary-label">Salary Range</div>
    </div>
  </div>
</body>
</html>
